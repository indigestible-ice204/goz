# cargo-deny configuration.
#
# The goz-winfs → goz-core direction ban lives here, not in CI: `wrappers`
# scopes a deny to a named set of dependents, which is precisely a direction
# rule, and it fails closed with no shell plumbing to get right.
#
# goz-core's own purity is the other half of the contract and is NOT expressible
# here: it is an allowlist over goz-core's direct deps, and a `wrappers` ban on
# windows-sys would fire on the legitimate clap/criterion/proptest paths that
# reach it. That check stays in .github/workflows/ci.yml, where it compares the
# direct-dep set for equality under `set -euo pipefail`, so a cargo failure
# fails the step. (The guard it replaced was `! cargo tree | grep`, which
# reported success both when the pattern was absent and when cargo itself
# died.)

[licenses]
allow = [
    # goz itself ships under MIT; the rest cover dependencies.
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]

[bans]
multiple-versions = "warn"

# The Win32 layer produces and consumes raw bytes and opaque handles; every
# interpretation of them lives in goz-core, where it is testable from fixtures
# on any OS (see goz-winfs/src/lib.rs). Naming goz-core's only two legitimate
# dependents turns a goz-winfs → goz-core edge into a hard error.
[[bans.deny]]
crate = "goz-core"
wrappers = ["goz-cli", "goz-daemon"]

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
